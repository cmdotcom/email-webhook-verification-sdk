name: 'Go - On pull request'

on:
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if should run
        id: check
        run: |
          # Always run for PRs targeting release branches
          if [[ "${{ github.base_ref }}" == release/* ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if relevant files changed
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(go/|\.github/workflows/go-)' || true)
          if [ -n "$CHANGED" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    uses: ./.github/workflows/go-build-and-test.yml
