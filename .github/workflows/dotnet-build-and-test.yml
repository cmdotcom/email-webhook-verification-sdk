name: '.NET - Build and test'

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**'
    paths:
      - 'dotnet/**'
  workflow_call:
    secrets:
      NUGET_API_KEY:
        required: true
      GITHUB_TOKEN:
        required: false

defaults:
  run:
    working-directory: dotnet/CM.Email.WebhookVerification

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0', '9.0']

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage report
        if: matrix.dotnet-version == '9.0'
        uses: actions/upload-artifact@v4
        with:
          name: test_results
          path: dotnet/CM.Email.WebhookVerification/TestResults/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: dotnet/CM.Email.WebhookVerification/nupkg/

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nupkg/

      - name: Publish to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Add Github Packages source
        run: dotnet nuget add source --username cmdotcom --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/cmdotcom/index.json"

      - name: Publish to Github Packages
        run: dotnet nuget push nupkg/*.nupkg -s github --skip-duplicate
